services:
  db:
    image: postgres:16-alpine
    container_name: product_catalog_db
    environment:
      POSTGRES_DB: product_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Healthcheck: la API no debe arrancar hasta que PostgreSQL
    # acepte conexiones (evita el clásico ECONNREFUSED al inicio).
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d product_catalog']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: product_catalog_api
    environment:
      NODE_ENV: production
      PORT: 3010
      # DB_HOST es 'db': dentro de la red de compose, los servicios
      # se resuelven por su nombre, no por localhost.
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: product_catalog
      FRONTEND_URL: http://localhost:3000
    ports:
      - '3010:3010'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: